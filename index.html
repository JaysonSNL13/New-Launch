<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Hard anti-cache: browser should never serve a stale copy of this HTML -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>New Launch &amp; Restock</title>
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700,900&f[]=jetbrains-mono@400,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --ink: #000000;
      --ink-soft: #3a3a3a;
      --ink-muted: #7a7a7a;
      --ink-faint: #c4c4c4;
      --line: #e5e5e5;
      --row-hover: #fafafa;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
    body {
      font-family: 'Satoshi', system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .wrap { max-width: 1400px; margin: 0 auto; padding: 20px 28px 40px; }

    /* ---------- header ---------- */
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; flex-wrap: wrap;
      border-bottom: 2px solid var(--ink); padding-bottom: 12px; margin-bottom: 14px;
    }
    .title-block { max-width: 640px; }
    h1 {
      font-family: 'Satoshi', sans-serif;
      font-weight: 700; font-size: clamp(22px, 2.4vw, 28px);
      line-height: 1.1; letter-spacing: -0.01em; margin: 0;
    }
    .meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-muted);
      min-width: 200px;
    }
    .meta button {
      margin-top: 4px; font: inherit; font-family: 'Satoshi', sans-serif; font-weight: 700;
      background: var(--ink); color: var(--bg); border: 1px solid var(--ink);
      padding: 5px 12px; border-radius: 0; cursor: pointer; font-size: 11px;
      letter-spacing: .06em; text-transform: uppercase;
      transition: background .15s ease, color .15s ease;
    }
    .meta button:hover { background: var(--bg); color: var(--ink); }
    .meta button:disabled { opacity: .4; cursor: wait; }

    /* ---------- stat strip ---------- */
    .stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
      border: 1px solid var(--line); margin-bottom: 12px;
      width: 33%; min-width: 340px; max-width: 460px;
    }
    .stat {
      padding: 8px 12px;
      display: flex; flex-direction: column; gap: 1px;
      align-items: center; text-align: center;
      border-right: 1px solid var(--line);
    }
    .stat:last-child { border-right: 0; }
    .stat-label {
      font-family: 'Satoshi', sans-serif; font-size: 9.5px;
      font-weight: 500;
      text-transform: uppercase; letter-spacing: .12em; color: var(--ink-muted);
    }
    .stat-value {
      font-family: 'Satoshi', sans-serif; font-size: 18px; line-height: 1.15;
      font-weight: 700; color: var(--ink); letter-spacing: -0.01em;
    }

    /* ---------- controls ---------- */
    .controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
      padding: 8px 0;
    }
    .segmented {
      display: inline-flex; border: 1px solid var(--ink);
    }
    .segmented button {
      font: inherit; border: 0; background: transparent; color: var(--ink);
      padding: 6px 14px; cursor: pointer; font-weight: 700; font-size: 12px;
      letter-spacing: .04em; text-transform: uppercase; border-right: 1px solid var(--ink);
    }
    .segmented button:last-child { border-right: 0; }
    .segmented button.active { background: var(--ink); color: var(--bg); }
    .controls select, .controls input[type="search"] {
      font: inherit; font-family: 'Satoshi', sans-serif; font-size: 13px;
      border: 1px solid var(--line); background: var(--bg); border-radius: 0;
      padding: 7px 10px; color: var(--ink); min-width: 160px;
      outline: none;
    }
    .controls select:focus, .controls input[type="search"]:focus {
      border-color: var(--ink);
    }
    .controls input[type="search"] { min-width: 240px; flex: 1; }
    .controls input[type="date"] {
      font: inherit; font-family: 'Satoshi', sans-serif; font-size: 12.5px;
      border: 1px solid var(--line); background: var(--bg);
      padding: 6px 8px; color: var(--ink); border-radius: 0;
      outline: none; min-width: 130px;
    }
    .controls input[type="date"]:focus { border-color: var(--ink); }
    .link-btn {
      font-family: 'Satoshi', sans-serif; font-weight: 500; font-size: 11px;
      letter-spacing: .06em; text-transform: uppercase;
      background: transparent; color: var(--ink-muted);
      border: 0; padding: 4px 6px; cursor: pointer; border-radius: 0;
      text-decoration: underline; text-underline-offset: 3px;
    }
    .link-btn:hover { color: var(--ink); }
    .controls label {
      font-family: 'Satoshi', sans-serif; font-size: 10.5px; font-weight: 500;
      text-transform: uppercase; letter-spacing: .14em; color: var(--ink-muted);
    }
    .spacer { flex: 1; }
    .count-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--ink-muted); padding: 4px 10px; border: 1px solid var(--line);
    }

    /* ---------- states ---------- */
    .state {
      padding: 48px 24px; text-align: center; color: var(--ink-muted);
      font-family: 'Satoshi', sans-serif; font-size: 14px;
      border: 1px solid var(--line);
    }
    .state.error {
      color: var(--ink); font-weight: 600;
    }
    .spinner {
      width: 12px; height: 12px; border: 2px solid var(--line);
      border-top-color: var(--ink); border-radius: 50%;
      animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 16px; text-align: center; font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px; color: var(--ink-muted); letter-spacing: .08em;
    }

    /* ---------- summary view ---------- */
    #summary-view { padding-top: 4px; }
    .summary-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin: 4px 0 14px 0;
    }
    .summary-hint {
      font-family: 'Satoshi', sans-serif; font-size: 12px; color: var(--ink-muted);
    }
    .summary-toolbar button {
      font-family: 'Satoshi', sans-serif; font-weight: 700; font-size: 11px;
      letter-spacing: .06em; text-transform: uppercase;
      background: var(--ink); color: var(--bg); border: 1px solid var(--ink);
      padding: 7px 14px; border-radius: 0; cursor: pointer;
      transition: background .15s ease, color .15s ease;
    }
    .summary-toolbar button:hover { background: var(--bg); color: var(--ink); }

    .bucket-block { margin-bottom: 28px; }
    .bucket-heading {
      font-family: 'Satoshi', sans-serif; font-weight: 700; font-size: 17px;
      border-bottom: 2px solid var(--ink); padding-bottom: 6px;
      margin: 24px 0 14px 0; display: block;
      letter-spacing: -0.01em;
    }
    .status-sub { margin-bottom: 18px; }
    .status-sub:last-child { margin-bottom: 0; }
    .status-sub-heading {
      font-family: 'Satoshi', sans-serif; font-weight: 700; font-size: 13px;
      text-transform: uppercase; letter-spacing: .12em;
      color: var(--ink-soft);
      margin: 14px 0 6px 0;
    }
    .summary-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      border: 1px solid var(--line); margin-bottom: 18px;
    }
    .summary-table thead th {
      background: #fafafa; text-align: left; font-family: 'Satoshi', sans-serif;
      font-weight: 700; font-size: 13px; color: var(--ink);
      padding: 10px 14px; border-bottom: 1px solid var(--line);
    }
    .summary-table thead th.center { text-align: center; }
    .summary-table tbody td {
      padding: 11px 14px; border-bottom: 1px solid var(--line);
      font-family: 'Satoshi', sans-serif; font-size: 13.5px; color: var(--ink);
      vertical-align: top;
    }
    .summary-table tbody tr:last-child td { border-bottom: 0; }
    .summary-table .col-count { text-align: center; width: 90px; font-weight: 700; }
    .summary-table .col-cat { width: 180px; }
    .summary-table .note {
      font-style: italic; color: var(--ink-soft); font-weight: 400;
    }

    @media (max-width: 860px) {
      h1 { font-size: 40px; }
      .stats { width: 100%; max-width: none; }
    }
    @media (max-width: 560px) {
      .stats { grid-template-columns: 1fr; min-width: 0; }
      .stat { border-right: 0; border-bottom: 1px solid var(--line); }
      .stat:last-child { border-bottom: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title-block">
        <h1>New Launch &amp; Restock</h1>
      </div>
      <div class="meta">
        <div id="updated-text">&mdash;</div>
        <button id="refresh-btn" type="button">Refresh now</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="stat-total">&mdash;</div></div>
      <div class="stat"><div class="stat-label">New Launch</div><div class="stat-value" id="stat-new">&mdash;</div></div>
      <div class="stat"><div class="stat-label">Restock</div><div class="stat-value" id="stat-restock">&mdash;</div></div>
    </section>

    <section class="controls">
      <label>Status</label>
      <div class="segmented" id="status-seg">
        <button data-value="all" class="active">All</button>
        <button data-value="New Launch">New Launch</button>
        <button data-value="Restock">Restock</button>
      </div>
      <label>Product Type</label>
      <select id="category-filter"><option value="all">All</option></select>
      <input id="search" type="search" placeholder="Search item name or SKU&hellip;" />
      <div class="spacer"></div>
      <div class="count-pill" id="count-pill">&mdash;</div>
    </section>

    <section id="summary-view"></section>

    <div id="empty-state" class="state" style="display:none">Nothing matches those filters.</div>
    <div id="loading-state" class="state"><span class="spinner"></span>Fetching latest data&hellip;</div>
    <div id="error-state" class="state error" style="display:none"></div>

    <footer>
      <span id="src-url"></span>
    </footer>
  </div>

  <script>
  (function () {
    // =====================================================
    // CONFIG
    // =====================================================
    var CONFIG = {
      owner:  'jaysonsnl13',
      repo:   'New-Launch',
      branch: 'main',
      file:   'NewLaunchJSON.json',
      refreshMs: 60 * 60 * 1000   // 1 hour
    };

    function jsonUrl() {
      // cache-bust with timestamp so neither browser nor GitHub raw CDN serves a stale copy
      return 'https://raw.githubusercontent.com/' + CONFIG.owner + '/' +
             CONFIG.repo + '/' + CONFIG.branch + '/' + CONFIG.file +
             '?t=' + Date.now();
    }

    // =====================================================
    // STATE
    // =====================================================
    var state = {
      all: [],
      filtered: [],
      sortKey: 'etaToStoresDate',
      sortDir: 'asc',
      filters: { status: 'all', category: 'all', q: '' },
      nextRefreshAt: 0
    };

    var $ = function (s) { return document.querySelector(s); };

    // =====================================================
    // LOAD
    // =====================================================
    function load() {
      var url = jsonUrl();
      $('#loading-state').style.display = 'block';
      $('#error-state').style.display = 'none';
      $('#refresh-btn').disabled = true;

      fetch(url, { cache: 'no-store' })
        .then(function (r) {
          if (!r.ok) {
            var err = new Error('HTTP ' + r.status + (r.status === 404 ? ' (file not found)' : ''));
            err.httpStatus = r.status;
            throw err;
          }
          return r.json();
        })
        .then(function (data) {
          state.all = Array.isArray(data.items) ? data.items : [];
          $('#updated-text').textContent = data.lastUpdated
            ? 'Source updated ' + formatUpdated(data.lastUpdated)
            : '';
          populateCategories();
          applyFilters();
          $('#loading-state').style.display = 'none';
          state.nextRefreshAt = Date.now() + CONFIG.refreshMs;
        })
        .catch(function (err) {
          $('#loading-state').style.display = 'none';
          $('#error-state').style.display = 'block';
          var rawUrl = 'https://raw.githubusercontent.com/' + CONFIG.owner + '/' +
                       CONFIG.repo + '/' + CONFIG.branch + '/' + CONFIG.file;
          var hint = '';
          if (err.httpStatus === 404) {
            hint = '<br/><br/>The JSON file was not found. Run <code>buildAndPushNewLaunch</code> in your Apps Script editor to generate it.';
          } else if (err.message.indexOf('Failed to fetch') !== -1) {
            hint = '<br/><br/>Network blocked or the repo is private. Check that <strong>' + CONFIG.repo + '</strong> is public.';
          }
          $('#error-state').innerHTML =
            'Could not load data &mdash; ' + escapeHtml(err.message) + hint +
            '<br/><br/><a href="' + rawUrl + '" target="_blank" rel="noopener">Open the raw JSON URL</a> to verify it exists.';
          state.nextRefreshAt = Date.now() + CONFIG.refreshMs;
        })
        .then(function () { $('#refresh-btn').disabled = false; });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
      });
    }

    function formatUpdated(iso) {
      try {
        var d = new Date(iso);
        return d.toLocaleString(undefined, {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: 'numeric', minute: '2-digit'
        });
      } catch (e) { return iso; }
    }

    // =====================================================
    // FILTER + SORT
    // =====================================================
    function populateCategories() {
      var cats = {};
      state.all.forEach(function (i) { if (i.category) cats[i.category] = true; });
      var sel = $('#category-filter');
      var current = state.filters.category;
      sel.innerHTML = '<option value="all">All</option>';
      Object.keys(cats).sort().forEach(function (c) {
        var o = document.createElement('option');
        o.value = c; o.textContent = c;
        if (c === current) o.selected = true;
        sel.appendChild(o);
      });
    }

    // Categories that together form a suit. When the user picks any one of
    // these, the others are pulled in so the Summary view can still detect
    // and consolidate suits (Blazer + Pants + Short Blazer). Orphan items
    // that don't find partners remain visible in their own category rows.
    var DRESS_SUIT_CATEGORIES  = ['Blazers', 'Blazer', 'Dress Pants', 'Dress Pant',
                                  'Suit Pants', 'Suit Pant',
                                  'Short Blazers', 'Short Blazer'];
    var CASUAL_SUIT_CATEGORIES = ['Casual Blazers', 'Casual Blazer',
                                  'Casual Pants', 'Casual Pant'];

    function categoryGroup(cat) {
      if (!cat) return null;
      var c = cat.toLowerCase().trim();
      var has = function (list) {
        return list.some(function (x) { return x.toLowerCase() === c; });
      };
      if (has(DRESS_SUIT_CATEGORIES))  return DRESS_SUIT_CATEGORIES;
      if (has(CASUAL_SUIT_CATEGORIES)) return CASUAL_SUIT_CATEGORIES;
      return null;
    }

    function applyFilters() {
      var f = state.filters;
      var q = f.q.trim().toLowerCase();

      // If the chosen category is part of a suit-component family,
      // match against every family member (case-insensitive). Otherwise,
      // strict match to the selected category.
      var catGroup = categoryGroup(f.category);
      var catSet = null;
      if (f.category !== 'all') {
        if (catGroup) {
          catSet = {};
          catGroup.forEach(function (c) { catSet[c.toLowerCase()] = true; });
        } else {
          catSet = {};
          catSet[f.category.toLowerCase()] = true;
        }
      }

      state.filtered = state.all.filter(function (i) {
        if (f.status !== 'all' && i.status !== f.status) return false;
        if (catSet && !catSet[(i.category || '').toLowerCase()]) return false;
        if (q) {
          var hay = (i.parentName + ' ' + (i.skus || []).join(' ')).toLowerCase();
          if (hay.indexOf(q) === -1) return false;
        }
        return true;
      });
      sortRows();
      render();
      updateStats();
    }

    function sortRows() {
      var k = state.sortKey, d = state.sortDir === 'asc' ? 1 : -1;
      state.filtered.sort(function (a, b) {
        var av = a[k], bv = b[k];
        if (av == null) av = '';
        if (bv == null) bv = '';
        if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * d;
        var cmp = String(av).localeCompare(String(bv)) * d;
        if (cmp !== 0) return cmp;
        return String(a.parentName || '').localeCompare(String(b.parentName || ''));
      });
    }

    // =====================================================
    // RENDER — always summary view now
    // =====================================================
    function render() {
      renderSummary();
      $('#count-pill').textContent =
        state.filtered.length + ' of ' + state.all.length + ' items';
    }

    // =====================================================
    // SUMMARY VIEW — bucket-first, then status sub-sections
    // =====================================================
    function renderSummary() {
      var container = $('#summary-view');
      container.innerHTML = '';
      if (state.filtered.length === 0) {
        container.innerHTML = '<div class="state">Nothing matches those filters.</div>';
        return;
      }

      // Toolbar with copy button
      var toolbar = document.createElement('div');
      toolbar.className = 'summary-toolbar';
      toolbar.innerHTML =
        '<div class="summary-hint">Memo-format preview. Click <strong>Copy memo</strong> to paste into Zipline.</div>' +
        '<button type="button" id="copy-memo-btn">Copy memo</button>';
      container.appendChild(toolbar);

      // Build bucket map from the filtered set (respects status + product-type + search)
      var buckets = groupByBucket(state.filtered);

      // For each bucket, emit the heading, then tables
      buckets.order.forEach(function (bucketName) {
        var items = buckets.map[bucketName].items;
        var block = document.createElement('div');
        block.className = 'bucket-block';

        var heading = document.createElement('h2');
        heading.className = 'bucket-heading';
        heading.textContent = bucketName;
        block.appendChild(heading);

        if (state.filters.status === 'all') {
          // Split into New Launch + Restock sub-sections
          var nl = items.filter(function (i) { return i.status === 'New Launch'; });
          var rs = items.filter(function (i) { return i.status === 'Restock'; });
          if (nl.length) block.appendChild(buildSubStatusBlock('New Launch', nl));
          if (rs.length) block.appendChild(buildSubStatusBlock('Restock',    rs));
        } else {
          // Filtered to one status — just show the consolidated table
          var rows = consolidateBucket(items);
          block.appendChild(buildSummaryTable(rows));
        }

        container.appendChild(block);
      });

      // Wire copy button
      $('#copy-memo-btn').addEventListener('click', function () {
        var memo = buildMemoText();
        copyToClipboard(memo);
        var b = $('#copy-memo-btn');
        var original = b.textContent;
        b.textContent = 'Copied!';
        setTimeout(function () { b.textContent = original; }, 1600);
      });
    }

    /**
     * Group items by ETA bucket, preserving chronological order (uses the
     * earliest ISO date within each bucket as the sort key).
     */
    function groupByBucket(items) {
      var map = {};
      items.forEach(function (i) {
        var key = i.etaToStores || 'No ETA';
        if (!map[key]) map[key] = { items: [], earliest: i.etaToStoresDate || '9999-12-31' };
        map[key].items.push(i);
        if (i.etaToStoresDate && i.etaToStoresDate < map[key].earliest) {
          map[key].earliest = i.etaToStoresDate;
        }
      });
      var order = Object.keys(map).sort(function (a, b) {
        return map[a].earliest.localeCompare(map[b].earliest);
      });
      return { map: map, order: order };
    }

    /** Renders a sub-heading ("New Launch" / "Restock") plus the table below it. */
    function buildSubStatusBlock(label, items) {
      var wrap = document.createElement('div');
      wrap.className = 'status-sub';

      var heading = document.createElement('h3');
      heading.className = 'status-sub-heading';
      heading.textContent = label;
      wrap.appendChild(heading);

      var rows = consolidateBucket(items);
      wrap.appendChild(buildSummaryTable(rows));
      return wrap;
    }

    // =====================================================
    // Plain-text memo builder
    // =====================================================
    function buildMemoText() {
      var lines = [];
      var buckets = groupByBucket(state.filtered);

      buckets.order.forEach(function (bucketName, idx) {
        if (idx > 0) { lines.push(''); lines.push('---'); lines.push(''); }

        lines.push('**' + bucketName + '**');
        lines.push('');

        var items = buckets.map[bucketName].items;

        if (state.filters.status === 'all') {
          var nl = items.filter(function (i) { return i.status === 'New Launch'; });
          var rs = items.filter(function (i) { return i.status === 'Restock'; });

          if (nl.length) {
            lines.push('*New Launch*');
            lines.push('');
            appendTableMarkdown(lines, consolidateBucket(nl));
          }
          if (rs.length) {
            if (nl.length) lines.push('');
            lines.push('*Restock*');
            lines.push('');
            appendTableMarkdown(lines, consolidateBucket(rs));
          }
        } else {
          appendTableMarkdown(lines, consolidateBucket(items));
        }
      });

      return lines.join('\n');
    }

    function appendTableMarkdown(lines, rows) {
      lines.push('| # of Styles | Category | Styles |');
      lines.push('|:---:|---|---|');
      rows.forEach(function (r) {
        var stylesCell = r.styles + (r.note ? ' *' + r.note + '*' : '');
        stylesCell = stylesCell.replace(/\|/g, '\\|');
        lines.push('| ' + r.count + ' | ' + r.category + ' | ' + stylesCell + ' |');
      });
    }

    function copyToClipboard(text) {
      // Write BOTH html (rich) and plain markdown to the clipboard.
      // Rich-text editors (Gmail, Google Docs, most Zipline-like editors) will
      // pick the HTML version and render proper bold/italic/tables.
      // Plain-text editors (Terminal, text files, some older fields) will
      // fall back to the markdown.
      try {
        var html = markdownToHtml(text);
        if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
          var item = new ClipboardItem({
            'text/html':  new Blob([html], { type: 'text/html' }),
            'text/plain': new Blob([text], { type: 'text/plain' })
          });
          navigator.clipboard.write([item]).catch(function () {
            fallbackCopyRich(html, text);
          });
          return;
        }
        fallbackCopyRich(html, text);
      } catch (e) {
        fallbackCopyRich(null, text);
      }
    }

    /**
     * Fallback that uses a hidden contenteditable div + document.execCommand('copy').
     * This also copies rich text in older browsers and Safari variants where
     * ClipboardItem isn't available. Plain-text-only as final fallback.
     */
    function fallbackCopyRich(html, text) {
      if (html) {
        var div = document.createElement('div');
        div.contentEditable = 'true';
        div.style.position = 'fixed';
        div.style.top = '-10000px';
        div.style.opacity = '0';
        div.innerHTML = html;
        document.body.appendChild(div);
        var range = document.createRange();
        range.selectNodeContents(div);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        try { document.execCommand('copy'); } catch (e) {}
        sel.removeAllRanges();
        document.body.removeChild(div);
        return;
      }
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      document.body.removeChild(ta);
    }

    /**
     * Minimal markdown-to-HTML converter tuned for this memo's output.
     * Handles: **bold**, *italic*, `code`, ordered/unordered lists,
     * horizontal rules, GitHub-style tables, and paragraphs.
     */
    function markdownToHtml(md) {
      var lines = md.split('\n');
      var out = [];
      var i = 0;

      function escapeHtml(s) {
        return s.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
      }
      function inline(s) {
        s = escapeHtml(s);
        s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
        s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
        return s;
      }

      while (i < lines.length) {
        var line = lines[i];

        // Blank line
        if (!line.trim()) { i++; continue; }

        // Horizontal rule
        if (/^---+\s*$/.test(line)) { out.push('<hr/>'); i++; continue; }

        // Table: a header row followed by a separator row of dashes/colons
        if (line.indexOf('|') !== -1 && i + 1 < lines.length &&
            /^\s*\|?\s*:?-+:?\s*(\|\s*:?-+:?\s*)+\|?\s*$/.test(lines[i + 1])) {

          var parseRow = function (r) {
            var t = r.trim();
            if (t.indexOf('|') === 0) t = t.slice(1);
            if (t.lastIndexOf('|') === t.length - 1) t = t.slice(0, -1);
            return t.split('|').map(function (c) { return c.trim(); });
          };
          var aligns = parseRow(lines[i + 1]).map(function (seg) {
            var l = seg.charAt(0) === ':';
            var r = seg.charAt(seg.length - 1) === ':';
            if (l && r) return 'center';
            if (r) return 'right';
            return 'left';
          });
          var header = parseRow(line);
          var rows = [];
          var j = i + 2;
          while (j < lines.length && lines[j].indexOf('|') !== -1 && lines[j].trim()) {
            rows.push(parseRow(lines[j])); j++;
          }
          var html = '<table style="border-collapse:collapse;border:1px solid #ccc;margin:10px 0;">';
          html += '<thead><tr>';
          header.forEach(function (h, idx) {
            html += '<th style="text-align:' + aligns[idx] + ';padding:6px 10px;border:1px solid #ccc;background:#f5f5f5;"><strong>' + inline(h) + '</strong></th>';
          });
          html += '</tr></thead><tbody>';
          rows.forEach(function (row) {
            html += '<tr>';
            row.forEach(function (cell, idx) {
              html += '<td style="text-align:' + (aligns[idx] || 'left') + ';padding:6px 10px;border:1px solid #ccc;vertical-align:top;">' + inline(cell) + '</td>';
            });
            html += '</tr>';
          });
          html += '</tbody></table>';
          out.push(html);
          i = j;
          continue;
        }

        // Ordered list
        if (/^\d+\.\s/.test(line)) {
          out.push('<ol>');
          while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
            out.push('<li>' + inline(lines[i].replace(/^\d+\.\s/, '')) + '</li>');
            i++;
          }
          out.push('</ol>');
          continue;
        }
        // Unordered list
        if (/^-\s/.test(line)) {
          out.push('<ul>');
          while (i < lines.length && /^-\s/.test(lines[i])) {
            out.push('<li>' + inline(lines[i].replace(/^-\s/, '')) + '</li>');
            i++;
          }
          out.push('</ul>');
          continue;
        }

        // Paragraph: accumulate consecutive non-blank lines
        var para = [line];
        i++;
        while (i < lines.length && lines[i].trim() &&
               !/^---+\s*$/.test(lines[i]) &&
               !/^\d+\.\s/.test(lines[i]) &&
               !/^-\s/.test(lines[i]) &&
               lines[i].indexOf('|') === -1) {
          para.push(lines[i]); i++;
        }
        out.push('<p>' + inline(para.join(' ')) + '</p>');
      }

      return out.join('\n');
    }

    /**
     * Consolidate a list of items into memo-style rows:
     *  - Suit detection: Blazers + Dress Pants + Short Blazers with same pattern = Suits
     *  - Casual Suit detection: Casual Blazers + Casual Pants with same pattern
     *  - Colorway collapse: remaining items grouped by category
     */
    function consolidateBucket(items) {
      // Extract pattern from each item (for suit matching)
      var enriched = items.map(function (i) {
        return { item: i, pattern: extractPattern(i.parentName) };
      });

      var byCat = {};
      enriched.forEach(function (e) {
        var cat = e.item.category || 'Uncategorized';
        if (!byCat[cat]) byCat[cat] = [];
        byCat[cat].push(e);
      });

      // Case/plural-insensitive category picker. Matches "Short Blazer",
      // "Short Blazers", "short blazers", "SHORT BLAZERS" interchangeably.
      function pickByCategory(aliases) {
        var out = [];
        Object.keys(byCat).forEach(function (cat) {
          var normCat = cat.toLowerCase().trim().replace(/s$/, '');
          for (var i = 0; i < aliases.length; i++) {
            var normAlias = aliases[i].toLowerCase().trim().replace(/s$/, '');
            if (normCat === normAlias) { out = out.concat(byCat[cat]); break; }
          }
        });
        return out;
      }

      var consumed = new Set();
      var rows = [];

      // --- Suits: Blazers + Dress Pants + Short Blazers ---
      rows = rows.concat(buildSuitRows(
        pickByCategory(['Blazers', 'Blazer']),
        pickByCategory(['Dress Pants', 'Dress Pant', 'Suit Pants', 'Suit Pant']),
        pickByCategory(['Short Blazers', 'Short Blazer']),
        consumed,
        'Suits',
        true
      ));

      // --- Casual Suits: Casual Blazers + Casual Pants ---
      rows = rows.concat(buildSuitRows(
        pickByCategory(['Casual Blazers', 'Casual Blazer']),
        pickByCategory(['Casual Pants', 'Casual Pant']),
        [],
        consumed,
        'Casual Suit',
        false
      ));

      // --- Remaining items: group by category, collapse colorways ---
      Object.keys(byCat).sort().forEach(function (cat) {
        var remaining = byCat[cat].filter(function (e) { return !consumed.has(e.item.parentName); });
        if (remaining.length === 0) return;
        // Unique styles (by pattern), preserving order of first appearance
        var seen = {};
        var styles = [];
        remaining.forEach(function (e) {
          var label = e.pattern || e.item.parentName;
          if (seen[label]) return;
          seen[label] = true;
          styles.push(label);
        });
        rows.push({ count: styles.length, category: cat, styles: styles.join(', '), note: '' });
      });

      return rows;
    }

    function buildSuitRows(partA, partB, partC, consumed, categoryLabel, threePart) {
      var patterns = {};
      function addPattern(list, key) {
        list.forEach(function (e) {
          var mk = patternMatchKey(e.pattern);
          if (!mk) return;
          if (!patterns[mk]) patterns[mk] = { displays: [] };
          patterns[mk][key] = e;
          patterns[mk].displays.push(e.pattern);
        });
      }
      addPattern(partA, 'a');
      addPattern(partB, 'b');
      if (threePart) addPattern(partC, 'c');

      function bestDisplay(d) {
        var uniq = {};
        d.forEach(function (s) { uniq[s] = (uniq[s] || 0) + 1; });
        return Object.keys(uniq).sort(function (x, y) { return y.length - x.length; })[0];
      }

      function compositionNote(sig, threePart) {
        if (threePart) {
          if (sig === 'ABC') return '(Blazer + Pants + Short Blazer)';
          if (sig === 'AB')  return '(Blazer + Pants)';
          if (sig === 'BC')  return '(Pants + Short Blazer)';
          if (sig === 'AC')  return '(Blazer + Short Blazer)';
        } else {
          if (sig === 'AB')  return '(Blazer + Pants)';
        }
        return '';
      }

      // Build the list of qualifying suits (single-component = not a suit)
      var suits = [];
      Object.keys(patterns).forEach(function (mk) {
        var g = patterns[mk];
        var sig = (g.a ? 'A' : '') + (g.b ? 'B' : '') + (g.c ? 'C' : '');
        if (threePart && sig.length < 2) return;
        if (!threePart && sig !== 'AB')  return;

        suits.push({
          display: bestDisplay(g.displays),
          sig:     sig,
          items:   ['a', 'b', 'c'].map(function (k) { return g[k]; }).filter(Boolean)
        });

        ['a', 'b', 'c'].forEach(function (k) {
          if (g[k]) consumed.add(g[k].item.parentName);
        });
      });

      if (suits.length === 0) return [];

      // All the same composition -> single blanket note at end of row.
      // Mixed composition -> inline note per style so nothing is lost.
      var allSameSig = suits.every(function (s) { return s.sig === suits[0].sig; });

      var styles;
      var rowNote = '';
      if (allSameSig) {
        styles = suits.map(function (s) { return s.display; }).join(', ');
        var singleNote = compositionNote(suits[0].sig, threePart);
        rowNote = suits.length > 1 && singleNote
          ? singleNote.replace(')', ' each)')
          : singleNote;
      } else {
        styles = suits.map(function (s) {
          var note = compositionNote(s.sig, threePart);
          return s.display + (note ? ' ' + note : '');
        }).join(', ');
      }

      return [{
        count:    suits.length,
        category: categoryLabel,
        styles:   styles,
        note:     rowNote
      }];
    }

    function buildSummaryTable(rows) {
      var table = document.createElement('table');
      table.className = 'summary-table';
      table.innerHTML =
        '<thead><tr>' +
        '<th class="center col-count"># of Styles</th>' +
        '<th class="col-cat">Category</th>' +
        '<th>Styles</th>' +
        '</tr></thead><tbody></tbody>';
      var tb = table.querySelector('tbody');
      rows.forEach(function (r) {
        var tr = document.createElement('tr');
        var tdCount = document.createElement('td');
        tdCount.className = 'col-count';
        tdCount.textContent = r.count;
        var tdCat = document.createElement('td');
        tdCat.className = 'col-cat';
        tdCat.textContent = r.category;
        var tdStyles = document.createElement('td');
        tdStyles.textContent = r.styles;
        if (r.note) {
          var noteSpan = document.createElement('span');
          noteSpan.className = 'note';
          noteSpan.textContent = ' ' + r.note;
          tdStyles.appendChild(noteSpan);
        }
        tr.appendChild(tdCount);
        tr.appendChild(tdCat);
        tr.appendChild(tdStyles);
        tb.appendChild(tr);
      });
      return table;
    }

    /**
     * Extract the color/pattern portion of an item name for suit matching.
     * "Athletic Fit Stretch Blazer - Heathered Black"         -> "Heathered Black"
     * "Athletic Fit Stretch Suit Pants - Heathered Black"     -> "Heathered Black"
     * "Athletic Fit Stretch Blazer - Heathered Black - Short" -> "Heathered Black"
     * Items without " - " fall back to the full name.
     */
    function extractPattern(name) {
      if (!name) return '';
      var parts = String(name).split(' - ');
      if (parts.length < 2) return name;
      // Strip a trailing " - Short" suffix before comparing.
      if (parts[parts.length - 1].trim().toLowerCase() === 'short') parts.pop();
      return parts.slice(1).join(' - ').trim();
    }

    /**
     * Normalized "match key" for deciding if two patterns represent the same suit.
     * - Case-insensitive
     * - Ignores punctuation (&, ',', '-') and extra whitespace
     * - Strips common scale/size modifiers ("mini", "micro") that sometimes
     *   appear inconsistently across Blazer / Pants / Short Blazer names.
     *   Example: "Navy & Black Mini Houndstooth" and "Navy & Black Houndstooth"
     *   both normalize to the same key so the suit consolidates correctly.
     * - Sorts tokens so word-order differences don't block matching.
     *
     * If two genuinely-different patterns only differ by one of these modifiers,
     * they'll collide here — in practice that's rare and the skill authors can
     * prefer naming consistency in the sheet.
     */
    var SUIT_MATCH_IGNORE_WORDS = ['mini', 'micro'];
    function patternMatchKey(p) {
      if (!p) return '';
      return String(p)
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(function (w) {
          return w && SUIT_MATCH_IGNORE_WORDS.indexOf(w) === -1;
        })
        .sort()
        .join(' ');
    }

    function updateStats() {
      // Count against the filtered set so date-range, status, category and search
      // all reflect accurately in the summary stats at the top of the page.
      var scope = state.filtered;
      $('#stat-total').textContent = scope.length;
      $('#stat-new').textContent = scope.filter(function (i) { return i.status === 'New Launch'; }).length;
      $('#stat-restock').textContent = scope.filter(function (i) { return i.status === 'Restock'; }).length;
    }

    // =====================================================
    // AUTO-REFRESH (hourly, cache-busting, no visible timer)
    // =====================================================
    setInterval(load, CONFIG.refreshMs);

    // If the tab has been backgrounded for a while, fetch fresh data when it comes back.
    document.addEventListener('visibilitychange', function () {
      if (!document.hidden && state.nextRefreshAt &&
          (state.nextRefreshAt - Date.now()) < (CONFIG.refreshMs - 5*60*1000)) {
        load();
      }
    });

    // =====================================================
    // EVENTS
    // =====================================================
    document.querySelectorAll('#status-seg button').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('#status-seg button').forEach(function (x) { x.classList.remove('active'); });
        b.classList.add('active');
        state.filters.status = b.dataset.value;
        applyFilters();
      });
    });
    $('#category-filter').addEventListener('change', function (e) {
      state.filters.category = e.target.value; applyFilters();
    });
    $('#search').addEventListener('input', function (e) {
      state.filters.q = e.target.value; applyFilters();
    });
    $('#refresh-btn').addEventListener('click', load);

    $('#src-url').textContent = CONFIG.owner + '/' + CONFIG.repo + '/' + CONFIG.file;

    // Debug helper — from the browser console type  __nl_debug('The Palm')
    // to see every matching parent, its category, and its normalized pattern key.
    window.__nl_debug = function (needle) {
      needle = (needle || '').toLowerCase();
      var matches = state.all.filter(function (i) {
        return !needle ||
          (i.parentName || '').toLowerCase().indexOf(needle) !== -1 ||
          (i.category || '').toLowerCase().indexOf(needle) !== -1;
      });
      if (matches.length === 0) { console.log('No matches for "' + needle + '"'); return; }
      console.table(matches.map(function (i) {
        var pat = extractPattern(i.parentName);
        return {
          parentName: i.parentName,
          category:   i.category,
          pattern:    pat,
          matchKey:   patternMatchKey(pat),
          status:     i.status,
          bucket:     i.etaToStores
        };
      }));
    };

    load();
  })();
  </script>
</body>
